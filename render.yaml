services:
  - type: web
    name: atd-backend
    env: docker
    dockerContext: .
dockerfilePath: ./Dockerfile.backend-fix
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atd-postgres
          property: connectionString
    autoDeploy: true
    plan: free

databases:
  - name: atd-postgres
    databaseName: atd_db
    user: atd_user
    plan: free

